flush ruleset

table inet filter {
    set dynamic_access {
        type ipv4_addr . inet_service
        flags dynamic, timeout
        timeout 1m
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # Дозволяємо лупбек та встановлені з'єднання
        iifname "lo" accept
        ct state established,related accept

        # Динамічний доступ з нашого сету
        ip saddr . tcp dport @dynamic_access accept
        ip saddr . udp dport @dynamic_access accept

        # DROP для всього іншого (Stealth)
    }
    chain forward {
        type filter hook forward priority 0; policy drop;
    }
    chain output {
        type filter hook output priority 0; policy accept;
    }
}